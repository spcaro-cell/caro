name: Codespell

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  codespell:
    name: Check Spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: codespell-project/actions-codespell@v2
        with:
          check_filenames: true
          skip: "*.lock,./target,./Cargo.lock,./package-lock.json,./website/package-lock.json,./changelog/package-lock.json,./docs-site/package-lock.json,./landing/package-lock.json,./presentation/package-lock.json,./docs-site/node_modules,./website/node_modules,./landing/node_modules,./.git,./assets,./models,./apps,./specs,./website/src/i18n,./website/public,./exports,./presentation"
          ignore_words_file: .codespellignore
